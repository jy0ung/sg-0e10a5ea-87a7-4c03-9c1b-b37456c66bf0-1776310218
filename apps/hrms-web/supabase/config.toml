# Standalone local Supabase project for apps/hrms-web.
# Uses a separate project id and 5532x port range so it can run beside the
# root UBS stack without sharing Auth sessions, DB, or local service ports.
project_id = "flc-hrms-local"

[api]
enabled = true
port = 55321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 55322
shadow_port = 55320
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
port = 55329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[db.network_restrictions]
enabled = false
allowed_cidrs = ["0.0.0.0/0"]
allowed_cidrs_v6 = ["::/0"]

[realtime]
enabled = true

[studio]
enabled = true
port = 55323
api_url = "http://127.0.0.1:55321"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 55324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.s3_protocol]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3001"
external_url = "http://127.0.0.1:55321/auth/v1"
additional_redirect_urls = [
  "http://localhost:3001/signup",
  "http://localhost:3001/forgot-password",
  "http://localhost:3001/reset-password",
  "http://127.0.0.1:3001/signup",
  "http://127.0.0.1:3001/forgot-password",
  "http://127.0.0.1:3001/reset-password",
  "https://hrms.protonfookloi.com/signup",
  "https://hrms.protonfookloi.com/forgot-password",
  "https://hrms.protonfookloi.com/reset-password",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = ""

[auth.rate_limit]
email_sent = 30
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30
web3 = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.email.template.invite]
subject = "You have been invited to FLC HRMS"
content_path = "./supabase/templates/invite.html"

[auth.email.template.recovery]
subject = "Reset your FLC HRMS password"
content_path = "./supabase/templates/recovery.html"

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 55328

[analytics]
enabled = true
port = 55327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
