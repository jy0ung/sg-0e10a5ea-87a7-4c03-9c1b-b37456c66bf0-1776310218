version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      # Bundle patch/minor updates together to keep PR volume sane.
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Major versions handled manually — they frequently need code changes.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["ci"]
