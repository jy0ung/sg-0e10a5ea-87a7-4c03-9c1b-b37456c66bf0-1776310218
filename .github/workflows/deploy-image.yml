name: Deploy Image

# Pulls a published GHCR image onto the UAT / production host over SSH and
# performs a health-gated container swap via scripts/deploy-image.sh.
#
# Triggers:
#   • completion of a successful Release workflow on a semver tag
#     → auto-deploys to "uat"
#   • workflow_dispatch → choose environment + image tag
#
# Required per-environment secrets:
#   SSH_HOST                Cloudflare Access hostname, e.g. ssh.uat.example.com
#   SSH_USER                e.g. deploy
#   SSH_PORT                (optional, default 22)
#   SSH_PRIVATE_KEY         OpenSSH private key (begins with -----BEGIN…)
#   SSH_KNOWN_HOSTS         `ssh-keyscan <host>` output (collected through the
#                           tunnel once; see docs/DEPLOY.md)
#   CF_ACCESS_CLIENT_ID     Service-token client ID from a Cloudflare Access
#                           Service Auth policy on the SSH app
#   CF_ACCESS_CLIENT_SECRET Service-token secret
#   DEPLOY_CONTAINER_NAME   e.g. flc-bi-uat
#   DEPLOY_HOST_PORT        e.g. 8080
#   GHCR_READ_TOKEN         (only if the GHCR package is private)
#   GHCR_READ_USERNAME      (only if the GHCR package is private)
#   UAT_URL                 (optional, default https://uat.protonfookloi.com)
#   UAT_LOGIN_EMAIL         (optional, enables real browser login check)
#   UAT_LOGIN_PASSWORD      (optional, enables real browser login check)
#   UAT_LOGIN_REQUIRED      (optional, set to 1 to fail when login creds absent)
#   UAT_VERIFY_FETCH_ATTEMPTS (optional, default 3)
#
# Host-side prerequisites (see docs/DEPLOY.md for full recipe):
#   1. cloudflared tunnel route exposes the host's SSH port as a Public
#      Hostname with service=ssh://localhost:22
#   2. Cloudflare Access Application protects that hostname with a
#      Service Auth policy that allows a service token (NOT email OTP,
#      which can't be satisfied from CI).
#   3. The service-token client ID + secret are added as environment
#      secrets above.

on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        default: uat
        options:
          - uat
          - uat-hrms
          - production
          - production-hrms
      app:
        description: 'Published app image to deploy'
        type: choice
        required: true
        default: main
        options:
          - main
          - hrms-web
      image_tag:
        description: 'Image tag to deploy (e.g. v1.2.0 or sha-abc1234)'
        required: true

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'uat' }})
    # Only auto-deploy when the upstream Release succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'uat' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target environment
        id: env
        run: |
          if [[ -n "${{ github.event.inputs.environment }}" ]]; then
            echo "value=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=uat" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [[ -n "${INPUT_TAG:-}" ]]; then
            echo "value=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "${RUN_HEAD_BRANCH:-}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "value=${RUN_HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
          else
            # workflow_run was triggered by a push to main (not a tag) — fall
            # back to the short SHA tag produced by the release build.
            short_sha="${{ github.event.workflow_run.head_sha }}"
            echo "value=sha-${short_sha:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase image name
        id: img
        run: |
          suffix=""
          if [[ "${{ github.event.inputs.app }}" == "hrms-web" ]]; then
            suffix="-hrms-web"
          fi
          echo "name=$(echo '${{ github.repository }}'"$suffix" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Install cloudflared
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version

      - name: Configure SSH (with Cloudflare Access ProxyCommand)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Route SSH traffic through cloudflared. cloudflared reads the
          # service-token header pair from the env so no secret lands on disk.
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName $SSH_HOST
            Port $SSH_PORT
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            UserKnownHostsFile ~/.ssh/known_hosts
            ProxyCommand cloudflared access ssh --hostname %h
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF
          chmod 600 ~/.ssh/config

      - name: Copy deploy script through the tunnel
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          scp scripts/deploy-image.sh deploy-target:/tmp/deploy-image.sh

      - name: Run deploy on host through the tunnel
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CONTAINER_NAME: ${{ secrets.DEPLOY_CONTAINER_NAME }}
          HOST_PORT: ${{ secrets.DEPLOY_HOST_PORT }}
          GHCR_USERNAME: ${{ secrets.GHCR_READ_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          IMAGE: ghcr.io/${{ steps.img.outputs.name }}:${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          # Expand env locally before sending the remote deploy command.
          # shellcheck disable=SC2029
          ssh deploy-target \
            "chmod +x /tmp/deploy-image.sh && \
             CONTAINER_NAME='${CONTAINER_NAME}' \
             HOST_PORT='${HOST_PORT}' \
             GHCR_USERNAME='${GHCR_USERNAME:-}' \
             GHCR_TOKEN='${GHCR_TOKEN:-}' \
             /tmp/deploy-image.sh '${IMAGE}'"

      - uses: actions/setup-node@v4
        if: ${{ startsWith(steps.env.outputs.value, 'uat') }}
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install verifier dependencies
        if: ${{ startsWith(steps.env.outputs.value, 'uat') }}
        run: npm ci

      - name: Install Playwright Chromium for login verification
        if: ${{ startsWith(steps.env.outputs.value, 'uat') }}
        env:
          UAT_LOGIN_EMAIL: ${{ secrets.UAT_LOGIN_EMAIL }}
          UAT_LOGIN_PASSWORD: ${{ secrets.UAT_LOGIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${UAT_LOGIN_EMAIL:-}" && -n "${UAT_LOGIN_PASSWORD:-}" ]]; then
            npx playwright install --with-deps chromium
          else
            echo "Skipping browser install; UAT login credentials are not configured."
          fi

      - name: Verify UAT deployment
        if: ${{ startsWith(steps.env.outputs.value, 'uat') }}
        env:
          UAT_URL: ${{ secrets.UAT_URL || 'https://uat.protonfookloi.com' }}
          UAT_EXPECTED_SUPABASE_URL: ${{ secrets.UAT_EXPECTED_SUPABASE_URL || secrets.UAT_URL || 'https://uat.protonfookloi.com' }}
          UAT_HEALTH_URL: ${{ secrets.UAT_HEALTH_URL }}
          UAT_LOGIN_EMAIL: ${{ secrets.UAT_LOGIN_EMAIL }}
          UAT_LOGIN_PASSWORD: ${{ secrets.UAT_LOGIN_PASSWORD }}
          UAT_LOGIN_REQUIRED: ${{ secrets.UAT_LOGIN_REQUIRED }}
          UAT_VERIFY_FETCH_ATTEMPTS: ${{ secrets.UAT_VERIFY_FETCH_ATTEMPTS }}
        run: npm run verify:uat

      - name: Summary
        if: always()
        run: |
          {
            echo "### Deploy to ${{ github.event.inputs.environment || 'uat' }}"
            echo ""
            echo "- App: \`${{ github.event.inputs.app || 'main' }}\`"
            echo "- Image: \`ghcr.io/${{ steps.img.outputs.name }}:${{ steps.tag.outputs.value }}\`"
            echo "- Host: \`${{ secrets.SSH_HOST }}\`"
            echo "- Container: \`${{ secrets.DEPLOY_CONTAINER_NAME }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
