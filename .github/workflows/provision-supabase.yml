name: Provision Supabase Environment

# Idempotent end-to-end provisioning for a Supabase environment:
#   • Links the repo to the target project
#   • Dry-runs migrations (always, unconditionally)
#   • Applies migrations
#   • Verifies schema state
#   • Bootstraps the first super_admin
#   • Sets SITE_URL / APP_URL edge-function secrets
#
# Triggers:
#   • push to main  → auto-apply against the "staging" environment
#   • workflow_dispatch → manual target selection (staging|production)
#
# GitHub Environments are used as the approval gate: "production" should be
# configured with required reviewers + wait timer in repo settings so a human
# must approve before migrations hit prod.
#
# Required per-environment secrets:
#   SUPABASE_PROJECT_REF          (not secret; store as env var too)
#   SUPABASE_ACCESS_TOKEN         sbp_...
#   SUPABASE_DB_PASSWORD
#   SUPABASE_SERVICE_ROLE_KEY     JWT with role="service_role"
#   SITE_URL                      https://app.example.com
#   ADMIN_EMAIL
#   ADMIN_PASSWORD                (optional; only needed for first-time create)
#   COMPANY_NAME

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/bootstrap-admin.ts'
      - 'scripts/provision-supabase-env.sh'
      - '.github/workflows/provision-supabase.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
      dry_run:
        description: 'Plan only (no changes)'
        type: boolean
        required: false
        default: false

concurrency:
  group: provision-supabase-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Dry-run stage: always runs, prints the plan, never mutates ────────────
  plan:
    name: Plan migrations (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    environment:
      # Plan stage doesn't need approval — it is read-only.
      name: ${{ github.event.inputs.environment || 'staging' }}-plan
    outputs:
      env_name: ${{ steps.select.outputs.env_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Select target environment
        id: select
        run: |
          echo "env_name=${{ github.event.inputs.environment || 'staging' }}" >> "$GITHUB_OUTPUT"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dry-run migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_PROJECT_REF:-}" ]]; then
            echo "::error::SUPABASE_PROJECT_REF secret not set for this environment"
            exit 1
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --linked --dry-run

      - name: Lint migrations for destructive statements
        run: |
          set -euo pipefail
          # Destructive statements require an explicit approval marker in the
          # same migration file, e.g. `-- destructive: approved-by=<name>`.
          bad=0
          for f in supabase/migrations/*.sql; do
            if grep -qiE '(^|[[:space:]])(DROP[[:space:]]+TABLE|DROP[[:space:]]+COLUMN|DROP[[:space:]]+SCHEMA|TRUNCATE)' "$f"; then
              if ! grep -qE '^--[[:space:]]*destructive:[[:space:]]*approved-by=' "$f"; then
                echo "::error file=$f::destructive statement without '-- destructive: approved-by=<name>' marker"
                bad=1
              fi
            fi
          done
          exit $bad

  # ── Apply stage: gated by GitHub Environment approval for production ──────
  apply:
    name: Apply (${{ needs.plan.outputs.env_name }})
    needs: [plan]
    if: ${{ github.event_name == 'push' || github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment:
      # Match to a GitHub Environment configured with required reviewers
      # (Settings → Environments → production → Required reviewers).
      name: ${{ needs.plan.outputs.env_name }}
      url: ${{ secrets.SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install psql + jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client jq

      - name: Install deps (for tsx + bootstrap script)
        run: npm ci --ignore-scripts

      - name: Run provisioning script
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SITE_URL: ${{ secrets.SITE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          COMPANY_NAME: ${{ secrets.COMPANY_NAME }}
        run: |
          set -euo pipefail
          chmod +x scripts/provision-supabase-env.sh
          ./scripts/provision-supabase-env.sh --yes

      - name: Summary
        if: always()
        run: |
          echo "### Provisioning summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: \`${{ needs.plan.outputs.env_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Site URL: ${{ secrets.SITE_URL }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Admin: ${{ secrets.ADMIN_EMAIL }}" >> "$GITHUB_STEP_SUMMARY"
