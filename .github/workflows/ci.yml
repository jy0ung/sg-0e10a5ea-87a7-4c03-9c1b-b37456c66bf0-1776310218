name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel older runs on the same ref to keep queue times sane.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint

  # ── Web app: type-check + unit tests + build ────────────────────────────────
  web:
    name: Web App
    runs-on: ubuntu-latest
    env:
      # Provide minimal placeholder env so modules that read import.meta.env at
      # module load (env schema, supabase client) don't blow up in tests/build.
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: ci_placeholder_anon_key_do_not_use_in_production
      VITE_APP_ENV: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (web)
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --run

      - name: Production build
        run: npm run build

      - name: Bundle budget
        run: npm run bundle:budget

  # ── Mobile app: build gate ──────────────────────────────────────────────────
  mobile:
    name: Mobile App (hrms-mobile)
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: ci_placeholder_anon_key_do_not_use_in_production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mobile app (tsc + vite)
        run: npm run build
        working-directory: apps/hrms-mobile

  # ── Dependency audit (non-blocking until baseline is clean) ─────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit (high+ severity)
        run: npm audit --audit-level=high

  # ── End-to-end (Playwright manages its own dev server) ──────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [web]
    # Auth-dependent specs require real Supabase creds; skip those on PRs from
    # forks and only run smoke specs that work against mocked endpoints.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: ci_placeholder_anon_key_do_not_use_in_production
      VITE_APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Run desktop route smoke specs
        run: npx playwright test e2e/routes.spec.ts --project=chromium
      - name: Run responsive smoke specs
        run: npx playwright test e2e/responsive.spec.ts --project=mobile-chromium --project=tablet-chromium
      - name: Run accessibility smoke specs
        run: npx playwright test e2e/accessibility.spec.ts --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── RLS acceptance gate (requires seeded staging/local RLS users) ───────────
  rls:
    name: RLS Matrix
    runs-on: ubuntu-latest
    needs: [web]
    if: github.event_name == 'push'
    env:
      RLS_CI_REQUIRED: ${{ vars.RLS_CI_REQUIRED }}
      VITE_SUPABASE_URL: ${{ secrets.RLS_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.RLS_SUPABASE_ANON_KEY }}
      RLS_USER_A_EMAIL: ${{ secrets.RLS_USER_A_EMAIL }}
      RLS_USER_A_PASSWORD: ${{ secrets.RLS_USER_A_PASSWORD }}
      RLS_USER_B_EMAIL: ${{ secrets.RLS_USER_B_EMAIL }}
      RLS_USER_B_PASSWORD: ${{ secrets.RLS_USER_B_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Check RLS credentials
        id: rls-env
        shell: bash
        run: |
          missing=0
          for name in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY RLS_USER_A_EMAIL RLS_USER_A_PASSWORD RLS_USER_B_EMAIL RLS_USER_B_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::notice::Missing $name for RLS matrix job"
              missing=1
            fi
          done

          if [[ "$missing" == "0" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          elif [[ "$RLS_CI_REQUIRED" == "true" ]]; then
            echo "RLS_CI_REQUIRED=true but one or more RLS secrets are missing" >&2
            exit 1
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.rls-env.outputs.ready == 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        if: steps.rls-env.outputs.ready == 'true'
        run: npm ci
      - name: Run RLS matrix
        if: steps.rls-env.outputs.ready == 'true'
        run: npm run test:rls
