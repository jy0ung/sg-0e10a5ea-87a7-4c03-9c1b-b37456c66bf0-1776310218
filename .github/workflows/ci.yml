name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'

jobs:
  # ── Web app: type-check + unit tests ────────────────────────────────────────
  web:
    name: Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (web)
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  # ── Mobile app: type-check + production build ────────────────────────────────
  mobile:
    name: Mobile App (hrms-mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mobile app (tsc + vite)
        run: npm run build
        working-directory: apps/hrms-mobile
