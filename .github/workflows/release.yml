name: Release

# Builds the production Docker image on semver tags and publishes it to GHCR.
# The image bundles the static SPA (Vite build) served by nginx. Deployment
# to the UAT / production host is handled by deploy-image.yml.
#
# Required repo/environment secrets (used as Docker build args — public values
# are inlined into the SPA):
#   VITE_SUPABASE_URL         Public browser-facing URL. For self-hosted UAT,
#                             use https://uat.protonfookloi.com so nginx can
#                             proxy Supabase API paths to the private upstream.
#   VITE_SUPABASE_ANON_KEY    sb_publishable_... (anon/publishable key only)
#   VITE_APP_URL              https://app.<domain> or UAT origin
#   VITE_HRMS_APP_URL         (optional) https://hrms.<domain> for the main app launcher
#   VITE_SENTRY_DSN           (optional)
#
# Optional repo/environment secrets:
#   SUPABASE_INTERNAL_URL     Private upstream for nginx proxy routes. Defaults
#                             to the current LAN Supabase host for UAT.
#
# Build targets:
#   main-with-hrms            Root app plus HRMS web mounted at /hrms/.
#   main                      Root app only.
#   hrms-web                  Standalone apps/hrms-web image for HRMS subdomain.
#
# Optional Sentry release: SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT,
# plus repo variable ENABLE_SENTRY_RELEASE=true to opt in.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.0)'
        required: true
      environment:
        description: 'Environment secrets to use for browser build values'
        type: choice
        required: true
        default: production
        options:
          - uat
          - uat-hrms
          - production
          - production-hrms
      build_target:
        description: 'Docker image target to build'
        type: choice
        required: true
        default: main-with-hrms
        options:
          - main-with-hrms
          - main
          - hrms-web

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build & Publish Docker image
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    outputs:
      version: ${{ steps.tag.outputs.value }}
      digest: ${{ steps.push.outputs.digest }}
      build_target: ${{ steps.build-target.outputs.value }}
      build_workspace: ${{ steps.build-target.outputs.workspace }}
      build_output_dir: ${{ steps.build-target.outputs.output_dir }}
      build_hrms_web: ${{ steps.build-target.outputs.build_hrms_web }}
      image_name: ${{ steps.img.outputs.name }}
      release_environment: ${{ steps.release-env.outputs.value }}
      app_env: ${{ steps.release-env.outputs.app_env }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release environment
        id: release-env
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          release_environment="${INPUT_ENVIRONMENT:-production}"

          case "$release_environment" in
            uat|uat-hrms)
              app_env="staging"
              ;;
            production|production-hrms)
              app_env="production"
              ;;
            *)
              echo "Unsupported release environment: $release_environment" >&2
              exit 1
              ;;
          esac

          echo "value=$release_environment" >> "$GITHUB_OUTPUT"
          echo "app_env=$app_env" >> "$GITHUB_OUTPUT"

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build target
        id: build-target
        env:
          INPUT_BUILD_TARGET: ${{ inputs.build_target }}
        run: |
          set -euo pipefail
          target="${INPUT_BUILD_TARGET:-main-with-hrms}"

          case "$target" in
            main-with-hrms)
              workspace=""
              output_dir="dist"
              build_hrms_web="true"
              image_suffix=""
              ;;
            main)
              workspace=""
              output_dir="dist"
              build_hrms_web="false"
              image_suffix=""
              ;;
            hrms-web)
              workspace="apps/hrms-web"
              output_dir="apps/hrms-web/dist"
              build_hrms_web="false"
              image_suffix="-hrms-web"
              ;;
            *)
              echo "Unsupported build target: $target" >&2
              exit 1
              ;;
          esac

          echo "value=$target" >> "$GITHUB_OUTPUT"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          echo "output_dir=$output_dir" >> "$GITHUB_OUTPUT"
          echo "build_hrms_web=$build_hrms_web" >> "$GITHUB_OUTPUT"
          echo "image_suffix=$image_suffix" >> "$GITHUB_OUTPUT"

      # Typecheck + unit tests still run in-repo so we never ship an image
      # that failed verification. The Docker build stage runs its own
      # `npm run build`, so we do NOT pre-build dist/ here.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --run

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}${{ steps.build-target.outputs.image_suffix }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve Supabase upstream
        id: supabase-upstream
        env:
          SUPABASE_INTERNAL_URL: ${{ secrets.SUPABASE_INTERNAL_URL }}
        run: |
          value="${SUPABASE_INTERNAL_URL:-http://192.168.1.241:54321}"
          echo "value=${value}" >> "$GITHUB_OUTPUT"

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.value }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ !contains(steps.tag.outputs.value, '-') }}

      - name: Build & push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_APP_ENV=${{ steps.release-env.outputs.app_env }}
            VITE_APP_URL=${{ secrets.VITE_APP_URL }}
            VITE_HRMS_APP_URL=${{ secrets.VITE_HRMS_APP_URL }}
            VITE_APP_VERSION=${{ steps.tag.outputs.value }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            SUPABASE_INTERNAL_URL=${{ steps.supabase-upstream.outputs.value }}
            BUILD_WORKSPACE=${{ steps.build-target.outputs.workspace }}
            BUILD_OUTPUT_DIR=${{ steps.build-target.outputs.output_dir }}
            BUILD_HRMS_WEB=${{ steps.build-target.outputs.build_hrms_web }}

      - name: Summary
        run: |
          {
            echo "### Release ${{ steps.tag.outputs.value }}"
            echo ""
            echo "**Environment:** ${{ steps.release-env.outputs.value }}"
            echo ""
            echo "**Vite app env:** ${{ steps.release-env.outputs.app_env }}"
            echo ""
            echo "**Build target:** \`${{ steps.build-target.outputs.value }}\`"
            echo ""
            echo "**Image tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo "**Digest:** \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  sentry-release:
    name: Sentry release + source maps
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.build-and-publish.outputs.release_environment }}
    if: ${{ vars.ENABLE_SENTRY_RELEASE == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build with source maps
        env:
          BUILD_SOURCEMAP: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: ${{ needs.build-and-publish.outputs.app_env }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_HRMS_APP_URL: ${{ secrets.VITE_HRMS_APP_URL }}
          VITE_APP_VERSION: ${{ needs.build-and-publish.outputs.version }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          BUILD_WORKSPACE: ${{ needs.build-and-publish.outputs.build_workspace }}
          BUILD_OUTPUT_DIR: ${{ needs.build-and-publish.outputs.build_output_dir }}
          BUILD_HRMS_WEB: ${{ needs.build-and-publish.outputs.build_hrms_web }}
        run: |
          set -euo pipefail
          if [[ -n "${BUILD_WORKSPACE:-}" ]]; then
            npm run build --workspace "$BUILD_WORKSPACE"
          else
            npm run build
            if [[ "${BUILD_HRMS_WEB:-false}" == "true" ]]; then
              VITE_BASE_PATH=/hrms/ npm run build --workspace apps/hrms-web
            fi
          fi
      - name: Upload source maps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          VERSION="${{ needs.build-and-publish.outputs.version }}"
          SOURCEMAP_DIR="${{ needs.build-and-publish.outputs.build_output_dir }}"
          if [[ "${{ needs.build-and-publish.outputs.build_hrms_web }}" == "true" ]]; then
            SOURCEMAP_DIR="$SOURCEMAP_DIR apps/hrms-web/dist"
          fi
          npx --yes @sentry/cli releases new "$VERSION"
          # shellcheck disable=SC2086
          npx --yes @sentry/cli releases files "$VERSION" upload-sourcemaps $SOURCEMAP_DIR --rewrite
          npx --yes @sentry/cli releases finalize "$VERSION"
