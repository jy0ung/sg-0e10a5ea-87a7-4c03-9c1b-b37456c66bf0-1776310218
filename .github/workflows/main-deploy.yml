name: Production Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Existing image tag to deploy instead of building from source'
        required: false
      build_target:
        description: 'Build target when building from source'
        type: choice
        required: false
        default: main-with-hrms
        options:
          - main-with-hrms
          - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Resolve source ref
        id: source
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            sha='${{ github.event.workflow_run.head_sha }}'
          else
            sha='${{ github.sha }}'
          fi

          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=${sha:0:7}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.source.outputs.sha }}

      - name: Lowercase image name
        id: img
        shell: bash
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy mode
        id: mode
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          INPUT_BUILD_TARGET: ${{ github.event.inputs.build_target }}
          SHORT_SHA: ${{ steps.source.outputs.short_sha }}
          IMAGE_NAME: ${{ steps.img.outputs.name }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_IMAGE_TAG:-}" ]]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "image_ref=${REGISTRY}/${IMAGE_NAME}:${INPUT_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "build_target=existing-image" >> "$GITHUB_OUTPUT"
            echo "build_workspace=" >> "$GITHUB_OUTPUT"
            echo "build_output_dir=dist" >> "$GITHUB_OUTPUT"
            echo "build_hrms_web=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          target="${INPUT_BUILD_TARGET:-main-with-hrms}"
          case "$target" in
            main-with-hrms)
              build_workspace=""
              build_output_dir="dist"
              build_hrms_web="true"
              ;;
            main)
              build_workspace=""
              build_output_dir="dist"
              build_hrms_web="false"
              ;;
            *)
              echo "Unsupported build target: $target" >&2
              exit 1
              ;;
          esac

          image_tag="sha-${SHORT_SHA}"
          echo "build=true" >> "$GITHUB_OUTPUT"
          echo "image_ref=${REGISTRY}/${IMAGE_NAME}:${image_tag}" >> "$GITHUB_OUTPUT"
          echo "build_target=$target" >> "$GITHUB_OUTPUT"
          echo "build_workspace=$build_workspace" >> "$GITHUB_OUTPUT"
          echo "build_output_dir=$build_output_dir" >> "$GITHUB_OUTPUT"
          echo "build_hrms_web=$build_hrms_web" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve login verification
        id: login
        shell: bash
        env:
          PROD_LOGIN_EMAIL: ${{ secrets.PROD_LOGIN_EMAIL }}
          PROD_LOGIN_PASSWORD: ${{ secrets.PROD_LOGIN_PASSWORD }}
          SMOKE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SMOKE_SUPABASE_ANON: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${PROD_LOGIN_EMAIL:-}" || -z "${PROD_LOGIN_PASSWORD:-}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${SMOKE_SUPABASE_URL:-}" || -z "${SMOKE_SUPABASE_ANON:-}" ]]; then
            echo "::warning::Skipping credentialed production smoke checks because Supabase auth verification secrets are missing."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          request_body="$(
            python3 - <<'PY'
import json
import os

print(json.dumps({
    "email": os.environ["PROD_LOGIN_EMAIL"],
    "password": os.environ["PROD_LOGIN_PASSWORD"],
}))
PY
          )"
          response_file="$(mktemp)"
          trap 'rm -f "$response_file"' EXIT
          status_code="$(
            curl -sS -o "$response_file" -w '%{http_code}' \
              -X POST "${SMOKE_SUPABASE_URL%/}/auth/v1/token?grant_type=password" \
              -H "apikey: ${SMOKE_SUPABASE_ANON}" \
              -H "Content-Type: application/json" \
              -d "$request_body" || true
          )"

          if [[ "$status_code" == "200" ]] && python3 - "$response_file" <<'PY'
import json
import sys

with open(sys.argv[1], encoding="utf-8") as handle:
    payload = json.load(handle)

token = payload.get("access_token")
raise SystemExit(0 if isinstance(token, str) and token else 1)
PY
          then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping credentialed production smoke checks because the configured smoke login is invalid."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright Chromium for login verification
        if: steps.login.outputs.enabled == 'true'
        run: npx playwright install --with-deps chromium

      - name: Set up Docker Buildx
        if: steps.mode.outputs.build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.mode.outputs.build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Supabase upstream
        if: steps.mode.outputs.build == 'true'
        id: supabase-upstream
        shell: bash
        env:
          SUPABASE_INTERNAL_URL: ${{ secrets.SUPABASE_INTERNAL_URL }}
        run: |
          set -euo pipefail

          value="${SUPABASE_INTERNAL_URL:-}"
          if [[ -z "$value" ]]; then
            echo "Missing production secret SUPABASE_INTERNAL_URL" >&2
            exit 1
          fi

          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: steps.mode.outputs.build == 'true'
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.mode.outputs.image_ref }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_APP_ENV=production
            VITE_APP_URL=${{ secrets.VITE_APP_URL }}
            VITE_HRMS_APP_URL=${{ secrets.VITE_HRMS_APP_URL }}
            VITE_APP_VERSION=${{ steps.source.outputs.sha }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            SUPABASE_INTERNAL_URL=${{ steps.supabase-upstream.outputs.value }}
            BUILD_WORKSPACE=${{ steps.mode.outputs.build_workspace }}
            BUILD_OUTPUT_DIR=${{ steps.mode.outputs.build_output_dir }}
            BUILD_HRMS_WEB=${{ steps.mode.outputs.build_hrms_web }}

      - name: Install cloudflared
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version

      - name: Configure SSH (with Cloudflare Access ProxyCommand)
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName $SSH_HOST
            Port $SSH_PORT
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            UserKnownHostsFile ~/.ssh/known_hosts
            ProxyCommand cloudflared access ssh --hostname %h
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF
          chmod 600 ~/.ssh/config

      - name: Copy deploy script through the tunnel
        shell: bash
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          scp scripts/deploy-image.sh deploy-target:/tmp/deploy-image.sh

      - name: Run deploy on host through the tunnel
        shell: bash
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CONTAINER_NAME: ${{ secrets.DEPLOY_CONTAINER_NAME }}
          HOST_PORT: ${{ secrets.DEPLOY_HOST_PORT }}
          GHCR_USERNAME: ${{ secrets.GHCR_READ_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          IMAGE: ${{ steps.mode.outputs.image_ref }}
        run: |
          set -euo pipefail
          ssh deploy-target \
            "chmod +x /tmp/deploy-image.sh && \
             CONTAINER_NAME='${CONTAINER_NAME}' \
             HOST_PORT='${HOST_PORT}' \
             GHCR_USERNAME='${GHCR_USERNAME:-}' \
             GHCR_TOKEN='${GHCR_TOKEN:-}' \
             /tmp/deploy-image.sh '${IMAGE}'"

      - name: Verify production deployment
        shell: bash
        env:
          PROD_APP: main
          PROD_URL: ${{ secrets.VITE_APP_URL }}
          PROD_EXPECTED_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          PROD_EXPECTED_HRMS_APP_URL: ${{ secrets.VITE_HRMS_APP_URL }}
          PROD_HEALTH_URL: ${{ format('{0}/healthz', secrets.VITE_APP_URL) }}
          PROD_LOGIN_EMAIL: ${{ secrets.PROD_LOGIN_EMAIL }}
          PROD_LOGIN_PASSWORD: ${{ secrets.PROD_LOGIN_PASSWORD }}
          PROD_LOGIN_REQUIRED: '0'
          PROD_VERIFY_FETCH_ATTEMPTS: '3'
        run: npm run verify:production

      - name: Probe RPC canaries
        if: steps.login.outputs.enabled == 'true'
        shell: bash
        env:
          SMOKE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SMOKE_SUPABASE_ANON: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SMOKE_LOGIN_EMAIL: ${{ secrets.PROD_LOGIN_EMAIL }}
          SMOKE_LOGIN_PASSWORD: ${{ secrets.PROD_LOGIN_PASSWORD }}
        run: npm run health:rpc-canaries

      - name: Smoke production modules
        if: steps.login.outputs.enabled == 'true'
        shell: bash
        env:
          PROD_URL: ${{ secrets.VITE_APP_URL }}
          PROD_HRMS_URL: ${{ secrets.VITE_HRMS_APP_URL }}
          PROD_LOGIN_EMAIL: ${{ secrets.PROD_LOGIN_EMAIL }}
          PROD_LOGIN_PASSWORD: ${{ secrets.PROD_LOGIN_PASSWORD }}
        run: npm run smoke:production

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Production deploy"
            echo ""
            echo "- Source SHA: \`${{ steps.source.outputs.sha }}\`"
            echo "- Image: \`${{ steps.mode.outputs.image_ref }}\`"
            echo "- Container: \`${{ secrets.DEPLOY_CONTAINER_NAME }}\`"
            echo "- Host: \`${{ secrets.SSH_HOST }}\`"
            echo "- Build target: \`${{ steps.mode.outputs.build_target }}\`"
            echo "- Credentialed module smoke: \`${{ steps.login.outputs.enabled }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
