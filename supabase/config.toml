[api]
external_url = "https://ubs.protonfookloi.com"

[auth]
site_url = "https://ubs.protonfookloi.com"
external_url = "https://ubs.protonfookloi.com/auth/v1"
additional_redirect_urls = [
  "https://ubs.protonfookloi.com/signup",
  "https://ubs.protonfookloi.com/reset-password",
  "https://ubs.protonfookloi.com/hrms/signup",
  "https://ubs.protonfookloi.com/hrms/forgot-password",
  "https://ubs.protonfookloi.com/hrms/reset-password",
  "https://hrms.protonfookloi.com/signup",
  "https://hrms.protonfookloi.com/forgot-password",
  "https://hrms.protonfookloi.com/reset-password"
]
# Phase 0 hotfix: public self-signup is disabled platform-wide.
# New users must be onboarded via the `invite-user` edge function, which
# requires an authenticated admin caller and provisions `profiles.company_id`
# server-side. Email confirmations are enabled so invited users verify
# their address before first login.
enable_signup = false

[auth.rate_limit]
email_sent = 30

[auth.email]
enable_signup = true
enable_confirmations = true

[auth.email.template.invite]
subject = "You have been invited to FLC BI"
content_path = "./supabase/templates/invite.html"

[auth.email.template.recovery]
subject = "Reset your FLC BI password"
content_path = "./supabase/templates/recovery.html"

# Use a production-ready SMTP server when you want auth emails to reach real users.
# Keep this block commented in git so local development continues to use Mailpit.
# Configure the live server with scripts/configure-supabase-auth-smtp.sh.
# BEGIN managed auth SMTP relay
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 587
user = "resend"
pass = "env(AUTH_SMTP_PASS)"
admin_email = "flsys@protonfookloi.com"
sender_name = "FOOK LOI SYSTEM"
# END managed auth SMTP relay

# ── Edge Function registration ────────────────────────────────────────────────
# All functions listed here require a valid JWT (verify_jwt = true).
# None are exposed as VITE_ browser dependencies.
# For self-hosted production (supabase-edge-runtime container), set
# SUPABASE_INTERNAL_FUNCTIONS_CONFIG to the JSON array below and restart the
# Edge Runtime service before invoking any function in production:
#
#   SUPABASE_INTERNAL_FUNCTIONS_CONFIG='[
#     {"name":"invite-user","verify_jwt":true},
#     {"name":"delete-user","verify_jwt":true},
#     {"name":"update-user-status","verify_jwt":true},
#     {"name":"send-push-notification","verify_jwt":true},
#     {"name":"rollover-leave-balances","verify_jwt":true},
#     {"name":"dms-sync-worker","verify_jwt":true}
#   ]'

[functions.invite-user]
verify_jwt = true

[functions.delete-user]
verify_jwt = true

[functions.update-user-status]
verify_jwt = true

[functions.send-push-notification]
verify_jwt = true

[functions.rollover-leave-balances]
verify_jwt = true

# Phase 5: backend-only DMS staging worker.
# Accepts caller-supplied raw DMS payloads and persists them into sync_runs
# and dms_raw_* staging tables. Does not live-fetch DMS or write canonical
# UBS rows. Must NOT be invoked from browser code — always use service role
# or a privileged server-side caller.
[functions.dms-sync-worker]
verify_jwt = true
