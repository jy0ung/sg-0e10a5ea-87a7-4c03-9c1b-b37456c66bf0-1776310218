server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the upstream version.
    server_tokens off;

    # ---- Security headers -------------------------------------------------
    # Strict defaults. Tune CSP when wiring Sentry / 3rd-party analytics — the
    # connect-src list below only allows the Supabase REST + realtime origins
    # (set at deploy time via an env-templated sidecar if needed).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Healthcheck ------------------------------------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- Static assets (hashed filenames) — cache aggressively ------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- SPA fallback -----------------------------------------------------
    location / {
        # index.html itself must not be cached, otherwise client stays stuck
        # on old asset references after a deploy.
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Deny any hidden dotfiles that accidentally made it into the bundle.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Compression.
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml
               font/woff2 font/woff text/javascript;
    gzip_min_length 256;
}
