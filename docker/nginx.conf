server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

        # Workbook imports can be several MB of row data.
        client_max_body_size 20m;

    # Don't leak the upstream version.
    server_tokens off;

    # ---- Security headers -------------------------------------------------
    # Strict defaults. Tune CSP when wiring Sentry / 3rd-party analytics — the
    # connect-src list below only allows the Supabase REST + realtime origins
    # (set at deploy time via an env-templated sidecar if needed).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Healthcheck ------------------------------------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- Static assets (hashed filenames) — cache aggressively ------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Dedicated HRMS SPA mounted under /hrms/ while the main app remains at /.
    location = /hrms {
        return 308 /hrms/;
    }

    location /hrms/assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /hrms/ {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri/ /hrms/index.html;
    }

    # Proxy Supabase APIs through the public app origin so browsers do not
    # need direct reachability to the private LAN host.
    location ~ ^/(auth|rest|graphql|functions|storage)/v1(?:/|$) {
        proxy_pass __SUPABASE_INTERNAL_URL__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }

    location ^~ /realtime/v1/ {
        proxy_pass __SUPABASE_INTERNAL_URL__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
    }

    # ---- SPA fallback -----------------------------------------------------
    location / {
        # index.html itself must not be cached, otherwise client stays stuck
        # on old asset references after a deploy.
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Deny any hidden dotfiles that accidentally made it into the bundle.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Compression.
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml
               font/woff2 font/woff text/javascript;
    gzip_min_length 256;
}
